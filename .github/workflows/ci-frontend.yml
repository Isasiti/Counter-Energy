name: Conectar Energía - CI Frontend

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'frontend/**' # El robot SOLO se activa si haces cambios dentro de la carpeta frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Iniciar sesión en DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir imagen y subir a DockerHub
      uses: docker/build-push-action@v5
      with:
        context: ./frontend # <-- ¡CLAVE! Le dice al robot: "Entra a la carpeta frontend"
        file: ./frontend/Dockerfile # <-- Le dice dónde está la receta de Node.js
        push: true
        tags: isasiti/counter-energy-frontend:latest