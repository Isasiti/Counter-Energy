name: Conectar Energía - CI Backend

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**' # El robot SOLO se activa si haces cambios dentro de la carpeta backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código del repositorio
      uses: actions/checkout@v4

    - name: Iniciar sesión en DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir imagen y subir a DockerHub
      uses: docker/build-push-action@v5
      with:
        context: ./backend # <-- ¡CLAVE! Le dice al robot: "Entra a la carpeta backend"
        file: ./backend/Dockerfile # <-- Le dice dónde está la receta
        push: true
        tags: isasiti/counter-energy-backend:latest